name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y python3-pip openjdk-17-jdk-headless git zip unzip wget \
            autoconf automake libtool libtool-bin pkg-config zlib1g-dev libncurses5-dev

      - name: Install Android SDK
        run: |
          SDK_DIR=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p $SDK_DIR/cmdline-tools
          cd $SDK_DIR/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools latest
          rm cmdline-tools.zip
          export PATH=$PATH:$SDK_DIR/cmdline-tools/latest/bin
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "build-tools;34.0.0" "platforms;android-34" "platform-tools"
          mkdir -p $SDK_DIR/tools/bin
          ln -sf $SDK_DIR/cmdline-tools/latest/bin/sdkmanager $SDK_DIR/tools/bin/sdkmanager

      - name: Install p4a + buildozer
        run: |
          pip install cython==0.29.34 setuptools
          pip install git+https://github.com/kivy/python-for-android.git@master
          pip install buildozer

      - name: Patch libffi configure.ac for autoconf 2.71 compat
        run: |
          P4A_SITE=$(python3 -c "import site; print(site.getsitepackages()[0])")
          LIBFFI_DIR=$(find $P4A_SITE -path "*/pythonforandroid/recipes/libffi/*" -name "configure.ac" 2>/dev/null | head -1)
          echo "Found libffi configure.ac at: $LIBFFI_DIR"
          if [ -n "$LIBFFI_DIR" ] && [ -f "$LIBFFI_DIR" ]; then
            # On Ubuntu 24.04 with autoconf 2.71, LT_SYS_SYMBOL_USCORE macro was removed.
            # It is referenced but never defined in the libffi configure.ac.
            # Add a stub definition before the first usage.
            python3 -c "
import re
path = '$LIBFFI_DIR'
with open(path) as f:
    content = f.read()
stub = '''
dnl Stub for autoconf 2.71 compatibility (macro removed in 2.71)
AC_DEFUN([LT_SYS_SYMBOL_USCORE],[AC_DEFINE([LT_SYS_SYMBOL_USCORE],[1])])
'''
if 'LT_SYS_SYMBOL_USCORE' in content and 'AC_DEFUN([LT_SYS_SYMBOL_USCORE]' not in content:
    # Insert stub right after first AC_INIT
    content = re.sub(r'(AC_INIT\([^)]+\))', r'\1\n' + stub.strip(), content, count=1)
    with open(path, 'w') as f:
        f.write(content)
    print('Patched OK')
else:
    print('Already patched or no LT_SYS_SYMBOL_USCORE found')
"
          else
            echo "libffi configure.ac not found in $P4A_SITE"
            find $P4A_SITE -name "configure.ac" 2>/dev/null | head -10
            exit 1
          fi

      - name: Build APK
        run: |
          export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/tools/bin:$PATH
          buildozer android debug
        env:
          BUILDZER_SKIP_ROOT_CHECK: '1'

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: trade-calculator-debug
          path: bin/*.apk
