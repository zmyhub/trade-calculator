name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip openjdk-17-jdk-headless git zip unzip wget autoconf automake libtool

      - name: Download and install Android SDK
        run: |
          SDK_DIR=$HOME/.buildozer/android/platform/android-sdk

          mkdir -p $SDK_DIR/cmdline-tools
          cd $SDK_DIR/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools latest
          rm cmdline-tools.zip

          export PATH=$PATH:$SDK_DIR/cmdline-tools/latest/bin
          yes | sdkmanager --licenses > /dev/null 2>&1 || true

          sdkmanager "build-tools;34.0.0" "platforms;android-34" "platform-tools"

          mkdir -p $SDK_DIR/tools/bin
          ln -sf $SDK_DIR/cmdline-tools/latest/bin/sdkmanager $SDK_DIR/tools/bin/sdkmanager

      - name: Install Python dependencies
        run: |
          pip install git+https://github.com/kivy/python-for-android.git@v2023.05.21 cython==0.29.34 setuptools
          pip install buildozer

      - name: Patch pythonforandroid libffi recipe for autoconf 2.71 compat
        run: |
          P4A_PYTHON=/opt/hostedtoolcache/Python/3.10.20/x64/bin/python3
          P4A_SITE=$($P4A_PYTHON -c "import site; print(site.getsitepackages()[0])")
          LIBFFI_DIR=$(find $P4A_SITE -name "libffi" -type d | grep recipes | head -1)
          echo "Found libffi recipe at: $LIBFFI_DIR"

          if [ -f "$LIBFFI_DIR/configure.ac" ]; then
            echo "Patching LT_SYS_SYMBOL_USCORE in configure.ac..."
            # LT_SYS_SYMBOL_USCORE is missing in autoconf 2.71+libtool 2.4.7+
            # Replace the problematic section with a stub that just defines the variable
            python3 - <<'PYEOF'
import re
import sys
path = sys.argv[1]
with open(path, 'r') as f:
    content = f.read()
# Comment out LT_SYS_SYMBOL_USCORE and replace with a stub definition
# The original line: LT_SYS_SYMBOL_USCORE
# We replace it so autoreconf doesn't fail
patched = re.sub(
    r'^LT_SYS_SYMBOL_USCORE',
    'dnl LT_SYS_SYMBOL_USCORE removed for autoconf-2.71 compat\nAC_DEFUN([LT_SYS_SYMBOL_USCORE],[uscore=yes])',
    content,
    flags=re.MULTILINE
)
with open(path, 'w') as f:
    f.write(patched)
print("Patched successfully")
          PYEOF
            $LIBFFI_DIR/configure.ac
            echo "Done patching"
          else
            echo "configure.ac not found, searching..."
            find $P4A_SITE -name "configure.ac" 2>/dev/null | head -5
          fi

      - name: Build APK
        run: |
          export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/tools/bin:$PATH
          export ACLOCAL_FLAGS="-I /usr/share/aclocal"
          buildozer android debug
        env:
          BUILDZER_SKIP_ROOT_CHECK: '1'

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: trade-calculator-debug
          path: bin/*.apk
