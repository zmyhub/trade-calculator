name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip openjdk-17-jdk-headless git zip unzip

      - name: Install Python dependencies
        run: |
          pip install buildozer cython setuptools

      - name: Accept Android SDK licenses
        run: |
          mkdir -p ~/.android
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          yes | sdkmanager --licenses 2>/dev/null || true
          # Also pre-accept common licenses in buildozer's SDK path
          echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > ~/.android/android-sdk-license
          echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" > ~/.android/android-sdk-preview-license
          echo -e "\nd975f751698a77b662f1254ddbeed3901e976f5a" >> ~/.android/android-sdk-license

      - name: Build APK
        run: |
          buildozer android debug
        env:
          BUILDZER_SKIP_ROOT_CHECK: '1'
          ANDROID_HOME: /root/.buildozer/android/platform/android-sdk
          ANDROID_SDK_ROOT: /root/.buildozer/android/platform/android-sdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: trade-calculator-debug
          path: bin/*.apk
