name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip openjdk-17-jdk-headless git zip unzip wget

      - name: Download and install Android SDK
        run: |
          SDK_DIR=$HOME/.buildozer/android/platform/android-sdk

          mkdir -p $SDK_DIR/cmdline-tools
          cd $SDK_DIR/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools latest
          rm cmdline-tools.zip

          export PATH=$PATH:$SDK_DIR/cmdline-tools/latest/bin
          yes | sdkmanager --licenses > /dev/null 2>&1 || true

          sdkmanager "build-tools;34.0.0" "platforms;android-34" "platform-tools"

          mkdir -p $SDK_DIR/tools/bin
          ln -sf $SDK_DIR/cmdline-tools/latest/bin/sdkmanager $SDK_DIR/tools/bin/sdkmanager

      - name: Install Python dependencies
        run: |
          pip install buildozer==1.4.0 pythonforandroid==2023.06.26 cython==0.29.34

      - name: Build APK
        run: |
          export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/tools/bin:$PATH
          buildozer android debug
        env:
          BUILDZER_SKIP_ROOT_CHECK: '1'

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: trade-calculator-debug
          path: bin/*.apk
