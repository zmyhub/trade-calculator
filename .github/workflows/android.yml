name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    container:
      image: mendable/android-kivy-builder:latest
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system deps
        run: |
          apt-get update
          apt-get install -y python3-pip git zip unzip wget openjdk-17-jdk-headless

      - name: Install Buildozer + p4a
        run: |
          pip install buildozer cython==0.29.34
          pip install git+https://github.com/kivy/python-for-android.git@master

      - name: Build APK
        run: |
          buildozer android debug
        env:
          BUILDZER_SKIP_ROOT_CHECK: '1'

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: trade-calculator-debug
          path: bin/*.apk
